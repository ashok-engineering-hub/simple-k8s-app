apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-k8s-app
  labels:
    app: simple-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-k8s-app
  template:
    metadata:
      labels:
        app: simple-k8s-app
    spec:
      containers:
        - name: simple-k8s-app
          image: ashokduraisamy/ashok-k8s:v1
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
